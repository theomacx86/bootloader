name: CI/CD Pipeline

on:
    workflow_dispatch:
    pull_request:
        branches: [master]
        types: [opened, synchronize]

permissions:
    contents: write

jobs:
    build:
        runs-on: ubuntu-slim
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
              with:
                  path: bootloader
            - name: Setup toolchain
              run: |
                  sudo apt update
                  sudo apt install clang lld build-essential uuid-dev iasl git  nasm  python-is-python3 git
            - name: Checkout edk2
              run: |
                  mkdir -p edk2
                  git clone https://github.com/tianocore/edk2.git  edk2
                  make -C edk2/BaseTools/Source/C/
            - name: Build bootloader
              run: |
                  cd edk2
                  source edksetup.sh
                  export PACKAGES_PATH=$(pwd)
                  cd -
                  cd bootloader
                  build -p bootloader.dsc -a X64
